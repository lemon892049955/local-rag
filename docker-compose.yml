version: "3.8"

services:
  # ===== Local RAG 主服务 =====
  local-rag:
    build: .
    container_name: local-rag
    ports:
      - "8900:8900"
    volumes:
      - ./data:/app/data
      - ./vectordb:/app/vectordb
      - ./wiki:/app/wiki
      - ./.env:/app/.env
    environment:
      - XHS_MCP_ENDPOINT=http://xhs-mcp:18060/mcp
    depends_on:
      - xhs-mcp
    restart: unless-stopped

  # ===== 小红书 MCP 服务 =====
  xhs-mcp:
    image: xpzouying/xiaohongshu-mcp:latest
    container_name: xhs-mcp
    ports:
      - "18060:18060"
    volumes:
      - ./tools/xhs-mcp/cookies.json:/app/cookies.json
    restart: unless-stopped
